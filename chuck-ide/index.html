<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chuck IDE — L'Atelier 8-Bit</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>

  <div id="app">

    <!-- ── Title bar ───────────────────────────────────────── -->
    <header id="titlebar">
      <!-- <div class="tl-lights">
        <span class="tl-close"></span>
        <span class="tl-min"></span>
        <span class="tl-max"></span>
      </div> -->
      <span class="titlebar-logo">⬡ CHUCK IDE</span>
      <span class="titlebar-file" id="titlebar-file">mode libre</span>
      <div class="titlebar-actions">
        <button class="titlebar-pill" id="btn-show-display" title="Écran">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          Écran
        </button>
        <button class="titlebar-pill" id="btn-show-registers" title="Registres">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Registres
        </button>
        <button class="titlebar-pill" id="btn-show-memory" title="Mémoire">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M3 15h18M9 3v18"/>
          </svg>
          Mémoire
        </button>
      </div>
    </header>

    <!-- ── Main workspace ──────────────────────────────────── -->
    <div id="workspace">

      <!-- Left toolbar -->
      <chuck-toolbar id="toolbar"></chuck-toolbar>

      <!-- Editor (CodeMirror) -->
      <chuck-editor id="editor"></chuck-editor>

      <!-- Challenge aside — panneau fixe à droite -->
      <chuck-challenge-panel id="challenge-aside"></chuck-challenge-panel>

    </div>

    <!-- ── Status bar ──────────────────────────────────────── -->
    <footer id="statusbar">
      <span class="sb-state" id="sb-state">Prêt</span>
      <span class="sb-sep">|</span>
      <span>MOS 6502</span>
      <span class="sb-sep">|</span>
      <span id="sb-pc">$0600</span>
      <div class="sb-right">
        <span id="sb-cursor">Ln 1  Col 1</span>
        <span class="sb-sep">|</span>
        <span>ASM</span>
        <span class="sb-sep">|</span>
        <span>UTF-8</span>
      </div>
    </footer>

  </div>

  <!-- ── Floating modals — empilées près du bord droit ──── -->
  <!-- Ordre droite→gauche : mémoire, registres, écran        -->
  <chuck-memory-dump id="modal-memory"
    style="top:66px; right:20px;"></chuck-memory-dump>
  <chuck-registers   id="modal-registers"
    style="top:66px; right:440px;"></chuck-registers>
  <chuck-display     id="modal-display"
    style="top:66px; right:770px;"></chuck-display>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
