<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Atelier du 8-bit — Chuck-8 Computer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="app">
      <!-- ── Title bar ───────────────────────────────────────── -->
      <header id="titlebar">
        <span class="titlebar-logo">👾 CHUCK IDE</span>
        <span class="titlebar-file" id="titlebar-file">mode libre</span>
        <div class="titlebar-actions">
          <button class="titlebar-pill" id="btn-show-welcome" title="Accueil / Parcours">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
            Menu
          </button>
          <button class="titlebar-pill" id="btn-show-display" title="Écran">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="2" y="3" width="20" height="14" rx="2" />
              <line x1="8" y1="21" x2="16" y2="21" />
              <line x1="12" y1="17" x2="12" y2="21" />
            </svg>
            Écran
          </button>
          <button
            class="titlebar-pill"
            id="btn-show-registers"
            title="Registres"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            Registres
          </button>
          
          <button
            class="titlebar-pill"
            id="btn-show-help"
            title="Formation / Aide"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
              <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
            Aide
          </button>
        </div>
      </header>

      <!-- ── Main workspace ──────────────────────────────────── -->
      <div id="workspace">
        <!-- Left toolbar -->
        <chuck-toolbar id="toolbar"></chuck-toolbar>

        <!-- Editor (CodeMirror) -->
        <chuck-editor id="editor"></chuck-editor>

        <!-- Challenge aside — panneau fixe à droite -->
        <chuck-side-panel id="side-panel"></chuck-side-panel>
      </div>

      <!-- ── Status bar ──────────────────────────────────────── -->
      <footer id="statusbar">
        <span class="sb-state" id="sb-state">Prêt</span>
        <span class="sb-sep">|</span>
        <span>Chuck-8 · MOS 6502 · 1 MHz</span>
        <span class="sb-sep">|</span>
        <span id="sb-mode">TXT</span>
        <span class="sb-sep">|</span>
        <span id="sb-pc">$E000</span>
        <div class="sb-right">
          <span id="sb-cursor">Ln 1 Col 1</span>
          <span class="sb-sep">|</span>
          <span>ASM</span>
          <span class="sb-sep">|</span>
          <span>UTF-8</span>
        </div>
      </footer>
    </div>

    <!-- ── Floating modals — empilées près du bord droit ──── -->
    <!-- Ordre droite→gauche : mémoire, registres, écran        -->
    <!-- <chuck-memory-dump id="modal-memory"
    style="top:66px; right:20px;"></chuck-memory-dump> -->
    <chuck-registers
      id="modal-registers"
      style="top: 66px; right: 440px"
    ></chuck-registers>
    <chuck-display
      id="modal-display"
      style="top: 66px; right: 50px"
    ></chuck-display>
    <chuck-help-modal id="modal-help"></chuck-help-modal>
    <chuck-learn-modal id="modal-learn"></chuck-learn-modal>
    <chuck-auth-gate id="modal-auth-gate"></chuck-auth-gate>
    <chuck-account-modal id="modal-account"></chuck-account-modal>
    <chuck-welcome-modal id="modal-welcome"></chuck-welcome-modal>
    <chuck-onboarding-tour></chuck-onboarding-tour>
    <chuck-track-paywall id="modal-track-paywall"></chuck-track-paywall>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
